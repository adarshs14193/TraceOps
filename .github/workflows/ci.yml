name: TraceOps CI

on:
  push:
    branches:
      - main

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Order Service
        run: |
          docker build -t wanna11be11developer/traceops-order-service:latest ./order-service
          docker push wanna11be11developer/traceops-order-service:latest

      - name: Build Payment Service
        run: |
          docker build -t wanna11be11developer/traceops-payment-service:latest ./payment-service
          docker push wanna11be11developer/traceops-payment-service:latest

      - name: Build Logger Service
        run: |
          docker build -t wanna11be11developer/traceops-logger-service:latest ./logger-service
          docker push wanna11be11developer/traceops-logger-service:latest

      - name: Build Analyser Service
        run: |
          docker build -t wanna11be11developer/traceops-analyser-service:latest ./analyser-service
          docker push wanna11be11developer/traceops-analyser-service:latest

      - name: Build NGINX
        run: |
          docker build -t wanna11be11developer/traceops-nginx:latest ./nginx
          docker push wanna11be11developer/traceops-nginx:latest