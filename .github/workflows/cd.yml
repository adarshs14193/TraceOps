name: TraceOps CD

on:
  workflow_run:
    workflows: ["TraceOps CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      # Here you would authenticate to your Kubernetes cluster

      - name: Deploy
        run: |
          kubectl apply -f k8s