apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
        - name: payment-service
          image: wanna11be11developer/traceops-payment-service:latest

          ports:
            - containerPort: 4000

          env:
            - name: LOGGER_SERVICE_URL
              value: http://logger-service:5000